# Add these locations inside the existing app.outscore.com server block.

location = /profit {
    return 301 /profit/;
}

location /profit/ {
    auth_basic "Outscore Profit";
    auth_basic_user_file /etc/nginx/.htpasswd-profit;
    alias /opt/agents/outscore_profit/frontend/dist/;
    index index.html;
    try_files $uri $uri/ /profit/index.html;
}

location /profit/api/ {
    auth_basic "Outscore Profit";
    auth_basic_user_file /etc/nginx/.htpasswd-profit;
    proxy_pass http://127.0.0.1:8010/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    client_max_body_size 5M;
}
